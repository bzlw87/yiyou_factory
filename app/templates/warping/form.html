{% extends "base.html" %}
{% block title %}{{ '编辑' if record else '新增' }}整经记录{% endblock %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-header"><h5 class="mb-0"><i class="bi bi-diagram-3"></i> {{ '编辑' if record else '新增' }}整经记录</h5></div>
    <div class="card-body">
        <form method="POST" id="warpingForm">
            <h6 class="text-primary mb-3">基本信息</h6>
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">板经日期 <span class="text-danger">*</span></label>
                    <input type="date" name="board_date" class="form-control" required value="{{ record.board_date.strftime('%Y-%m-%d') if record else '' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">客户名称 <span class="text-danger">*</span></label>
                    <input type="text" name="customer_name" class="form-control" required value="{{ record.customer_name if record else '' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">经车号</label>
                    <input type="text" name="loom_number" class="form-control" value="{{ record.loom_number if record else '' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">车次</label>
                    <input type="text" name="loom_batch" class="form-control" value="{{ record.loom_batch if record else '' }}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">品种</label>
                    <input type="text" name="yarn_type" class="form-control" value="{{ record.yarn_type if record else '' }}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">纱支</label>
                    <input type="text" name="yarn_count" class="form-control" value="{{ record.yarn_count if record else '' }}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">总经份</label>
                    <input type="number" name="total_ends" class="form-control" value="{{ record.total_ends if record else '' }}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">合并轴数</label>
                    <input type="number" name="total_beams" class="form-control" value="{{ record.total_beams if record else '' }}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">板长(m)</label>
                    <input type="number" step="0.01" name="board_length" class="form-control" value="{{ record.board_length if record else '' }}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">并车头份</label>
                    <input type="text" name="merge_ends" class="form-control" value="{{ record.merge_ends if record else '' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">每边线根数</label>
                    <input type="text" name="side_ends" class="form-control" value="{{ record.side_ends if record else '' }}">
                </div>
                <div class="col-md-9">
                    <label class="form-label">备注</label>
                    <input type="text" name="remark" class="form-control" value="{{ record.remark if record else '' }}">
                </div>
            </div>

            <hr>
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="text-primary mb-0">轴次明细</h6>
                <div>
                    <select id="wageRateSelect" class="form-select form-select-sm d-inline-block" style="width:auto">
                        <option value="0">选择费率</option>
                        {% for wr in wage_rates %}
                        <option value="{{ wr.rate }}">{{ wr.name }} ({{ wr.rate }}元/m)</option>
                        {% endfor %}
                    </select>
                    <button type="button" class="btn btn-sm btn-success" onclick="addDetailRow()"><i class="bi bi-plus"></i> 添加轴</button>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-bordered table-sm" id="detailsTable">
                    <thead class="table-light">
                        <tr><th style="width:60px">轴次</th><th>头份</th><th>长度(m)</th><th>轴号</th><th>班别</th><th>值车工</th><th>工资小计</th><th>备注</th><th style="width:50px"></th></tr>
                    </thead>
                    <tbody id="detailsBody"></tbody>
                    <tfoot>
                        <tr class="table-warning"><td colspan="6" class="text-end fw-bold">工资合计：</td><td id="totalWage" class="fw-bold text-danger">¥0.00</td><td colspan="2"></td></tr>
                    </tfoot>
                </table>
            </div>
            <input type="hidden" name="details_json" id="detailsJson">

            <div class="mt-3">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
                <a href="{{ url_for('warping.index') }}" class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
var detailIndex = 0;
function addDetailRow(data){
    data = data || {};
    detailIndex++;
    var order = data.beam_order || detailIndex;
    var row = '<tr>' +
        '<td><input type="number" class="form-control form-control-sm" value="' + order + '" data-field="beam_order" min="1" max="20"></td>' +
        '<td><input type="text" class="form-control form-control-sm" value="' + (data.head_count||'') + '" data-field="head_count"></td>' +
        '<td><input type="number" step="0.01" class="form-control form-control-sm detail-length" value="' + (data.length||'') + '" data-field="length" onchange="calcWage(this)"></td>' +
        '<td><input type="text" class="form-control form-control-sm" value="' + (data.beam_number||'') + '" data-field="beam_number"></td>' +
        '<td><input type="text" class="form-control form-control-sm" value="' + (data.shift||'') + '" data-field="shift" style="width:60px"></td>' +
        '<td><input type="text" class="form-control form-control-sm" value="' + (data.operator||'') + '" data-field="operator"></td>' +
        '<td><input type="number" step="0.01" class="form-control form-control-sm detail-wage" value="' + (data.wage_subtotal||'0') + '" data-field="wage_subtotal" onchange="sumWages()"></td>' +
        '<td><input type="text" class="form-control form-control-sm" value="' + (data.remark||'') + '" data-field="remark"></td>' +
        '<td><button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest(\'tr\').remove();sumWages()"><i class="bi bi-x"></i></button></td>' +
        '</tr>';
    document.getElementById('detailsBody').insertAdjacentHTML('beforeend', row);
    sumWages();
}
function calcWage(el){
    var rate = parseFloat(document.getElementById('wageRateSelect').value) || 0;
    var len = parseFloat(el.value) || 0;
    var wageInput = el.closest('tr').querySelector('.detail-wage');
    if(rate > 0) wageInput.value = (rate * len).toFixed(2);
    sumWages();
}
function sumWages(){
    var total = 0;
    document.querySelectorAll('.detail-wage').forEach(function(el){ total += parseFloat(el.value) || 0; });
    document.getElementById('totalWage').textContent = '¥' + total.toFixed(2);
}
document.getElementById('warpingForm').addEventListener('submit', function(e){
    var rows = document.querySelectorAll('#detailsBody tr');
    var details = [];
    rows.forEach(function(row){
        var obj = {};
        row.querySelectorAll('input').forEach(function(inp){ obj[inp.dataset.field] = inp.value; });
        if(obj.beam_order) details.push(obj);
    });
    document.getElementById('detailsJson').value = JSON.stringify(details);
});
// Load existing details
{% if details %}
{% for d in details %}
addDetailRow({beam_order:{{ d.beam_order }}, head_count:'{{ d.head_count or "" }}', length:'{{ d.length or "" }}', beam_number:'{{ d.beam_number or "" }}', shift:'{{ d.shift or "" }}', operator:'{{ d.operator or "" }}', wage_subtotal:'{{ d.wage_subtotal or 0 }}', remark:'{{ d.remark or "" }}'});
{% endfor %}
{% endif %}
</script>
{% endblock %}
