{% extends "base.html" %}
{% block title %}{{ '编辑' if record else '新增' }}整经工资{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-6"><div class="card shadow-sm">
    <div class="card-header"><h5 class="mb-0"><i class="bi bi-person-lines-fill"></i> {{ '编辑' if record else '新增' }}整经工资</h5></div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3"><label class="form-label">日期 <span class="text-danger">*</span></label><input type="date" name="wage_date" class="form-control" required value="{{ record.wage_date if record else '' }}"></div>
            <div class="mb-3"><label class="form-label">员工姓名 <span class="text-danger">*</span></label><input type="text" name="employee_name" class="form-control" required value="{{ record.employee_name if record else '' }}"></div>
            <div class="mb-3"><label class="form-label">金额 <span class="text-danger">*</span></label><input type="number" step="0.01" name="amount" class="form-control" required value="{{ record.amount if record else '' }}"></div>
            <div class="mb-3"><label class="form-label">备注</label><textarea name="remark" class="form-control" rows="2">{{ record.remark if record else '' }}</textarea></div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
            <a href="{{ url_for('wages.warping_index') }}" class="btn btn-secondary">取消</a>
        </form>
    </div>
</div></div></div>
{% endblock %}
