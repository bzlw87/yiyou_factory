{% extends "base.html" %}
{% block title %}{{ '编辑' if record else '新增' }}浆染车间工资{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-6"><div class="card shadow-sm">
    <div class="card-header"><h5 class="mb-0"><i class="bi bi-person-badge"></i> {{ '编辑' if record else '新增' }}浆染车间工资</h5></div>
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">月份 <span class="text-danger">*</span></label><input type="month" name="wage_month" class="form-control" required value="{{ record.wage_month if record else '' }}"></div>
                <div class="col-md-6"><label class="form-label">员工姓名 <span class="text-danger">*</span></label><input type="text" name="employee_name" class="form-control" required value="{{ record.employee_name if record else '' }}"></div>
                <div class="col-md-4"><label class="form-label">基本工资 <span class="text-danger">*</span></label><input type="number" step="0.01" name="base_salary" class="form-control" required value="{{ record.base_salary if record else '' }}"></div>
                <div class="col-md-4"><label class="form-label">出勤天数</label><input type="number" name="attendance_days" class="form-control" value="{{ record.attendance_days if record else '' }}"></div>
                <div class="col-md-4"><label class="form-label">加班费</label><input type="number" step="0.01" name="overtime" class="form-control" value="{{ record.overtime if record else 0 }}"></div>
                <div class="col-md-6"><label class="form-label">扣款</label><input type="number" step="0.01" name="deduction" class="form-control" value="{{ record.deduction if record else 0 }}"></div>
                <div class="col-12"><label class="form-label">备注</label><textarea name="remark" class="form-control" rows="2">{{ record.remark if record else '' }}</textarea></div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
                <a href="{{ url_for('wages.dyeing_index') }}" class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
</div></div></div>
{% endblock %}
