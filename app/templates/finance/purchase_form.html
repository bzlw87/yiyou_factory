{% extends "base.html" %}
{% block title %}{{ '编辑' if record else '新增' }}原材料采购{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-6"><div class="card shadow-sm">
    <div class="card-header"><h5 class="mb-0"><i class="bi bi-bag"></i> {{ '编辑' if record else '新增' }}原材料采购</h5></div>
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3"><label class="form-label">采购日期 <span class="text-danger">*</span></label><input type="date" name="purchase_date" class="form-control" required value="{{ record.purchase_date if record else '' }}"></div>
            <div class="mb-3"><label class="form-label">供应商 <span class="text-danger">*</span></label>
                <select name="supplier_id" class="form-select" required>
                    <option value="">-- 选择供应商 --</option>
                    {% for s in suppliers %}<option value="{{ s.id }}" {% if record and record.supplier_id == s.id %}selected{% endif %}>{{ s.name }}</option>{% endfor %}
                </select>
            </div>
            <div class="mb-3"><label class="form-label">原材料品种 <span class="text-danger">*</span></label>
                <select name="material_type_id" class="form-select" required>
                    <option value="">-- 选择品种 --</option>
                    {% for t in material_types %}<option value="{{ t.id }}" {% if record and record.material_type_id == t.id %}selected{% endif %}>{{ t.name }}</option>{% endfor %}
                </select>
            </div>
            <div class="row g-3 mb-3">
                <div class="col-6"><label class="form-label">重量(t) <span class="text-danger">*</span></label><input type="number" step="0.0001" name="weight_tons" class="form-control" required value="{{ record.weight_tons if record else '' }}"></div>
                <div class="col-6"><label class="form-label">单价(元/t) <span class="text-danger">*</span></label><input type="number" step="0.01" name="unit_price" class="form-control" required value="{{ record.unit_price if record else '' }}"></div>
            </div>
            <div class="mb-3"><label class="form-label">备注</label><textarea name="remark" class="form-control" rows="2">{{ record.remark if record else '' }}</textarea></div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
            <a href="{{ url_for('finance.purchase_list') }}" class="btn btn-secondary">取消</a>
        </form>
    </div>
</div></div></div>
{% endblock %}
