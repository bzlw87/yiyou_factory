{% extends "base.html" %}
{% block title %}登记收款 - {{ customer.name }}{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-6"><div class="card shadow-sm">
    <div class="card-header"><h5 class="mb-0"><i class="bi bi-cash"></i> 登记收款 - {{ customer.name }}</h5></div>
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3"><label class="form-label">收款日期 <span class="text-danger">*</span></label><input type="date" name="payment_date" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">金额 <span class="text-danger">*</span></label><input type="number" step="0.01" name="amount" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">收款方式</label><input type="text" name="method" class="form-control" placeholder="转账/现金"></div>
            <div class="mb-3"><label class="form-label">备注</label><textarea name="remark" class="form-control" rows="2"></textarea></div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
            <a href="{{ url_for('finance.receivable_detail', customer_id=customer.id) }}" class="btn btn-secondary">取消</a>
        </form>
    </div>
</div></div></div>
{% endblock %}
