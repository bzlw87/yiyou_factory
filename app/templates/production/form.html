{% extends "base.html" %}
{% block title %}{{ '编辑' if record else '新增' }}客户工艺{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-8"><div class="card shadow-sm">
    <div class="card-header"><h5 class="mb-0"><i class="bi bi-gear"></i> {{ '编辑' if record else '新增' }}客户工艺</h5></div>
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">缸次号 <span class="text-danger">*</span></label>
                    <input type="text" name="vat_number" class="form-control" required value="{{ record.vat_number if record else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">客户 <span class="text-danger">*</span></label>
                    <input type="text" name="customer_name" class="form-control" list="customerList" required placeholder="选择或输入新客户" value="{{ record.customer.name if record and record.customer else '' }}">
                    <datalist id="customerList">
                        {% for c in customers %}<option value="{{ c.name }}">{% endfor %}
                    </datalist>
                </div>
                <div class="col-md-3">
                    <label class="form-label">织数</label>
                    <input type="text" name="yarn_count" class="form-control" value="{{ record.yarn_count if record else '' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">品种</label>
                    <input type="text" name="variety_name" class="form-control" list="varietyList" placeholder="选择或输入新品种" value="{{ record.variety.name if record and record.variety else '' }}">
                    <datalist id="varietyList">
                        {% for v in varieties %}<option value="{{ v.name }}">{% endfor %}
                    </datalist>
                </div>
                <div class="col-md-3">
                    <label class="form-label">总经根数</label>
                    <input type="number" name="total_ends" class="form-control" value="{{ record.total_ends if record else '' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">设定板长(m)</label>
                    <input type="number" step="0.01" name="planned_length" class="form-control" value="{{ record.planned_length if record else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">加工颜色</label>
                    <input type="text" name="color" class="form-control" value="{{ record.color if record else '' }}">
                </div>
                <div class="col-12">
                    <label class="form-label">备注</label>
                    <textarea name="remark" class="form-control" rows="2">{{ record.remark if record else '' }}</textarea>
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
                <a href="{{ url_for('production.index') }}" class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
</div></div></div>
{% endblock %}
