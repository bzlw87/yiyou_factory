{% extends "base.html" %}
{% block title %}{{ '编辑' if customer else '新增' }}客户{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-6"><div class="card shadow-sm">
    <div class="card-header"><h5 class="mb-0"><i class="bi bi-person-rolodex"></i> {{ '编辑' if customer else '新增' }}客户</h5></div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">客户名称 <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control" required value="{{ customer.name if customer else '' }}">
            </div>
            <div class="mb-3">
                <label class="form-label">联系人</label>
                <input type="text" name="contact" class="form-control" value="{{ customer.contact if customer else '' }}">
            </div>
            <div class="mb-3">
                <label class="form-label">电话</label>
                <input type="text" name="phone" class="form-control" value="{{ customer.phone if customer else '' }}">
            </div>
            <div class="mb-3">
                <label class="form-label">备注</label>
                <textarea name="remark" class="form-control" rows="2">{{ customer.remark if customer else '' }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
            <a href="{{ url_for('admin.customer_list') }}" class="btn btn-secondary">取消</a>
        </form>
    </div>
</div></div></div>
{% endblock %}
