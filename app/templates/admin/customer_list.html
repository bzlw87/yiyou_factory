{% extends "base.html" %}
{% block title %}客户管理 - 益友染织{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="bi bi-person-rolodex"></i> 客户管理</h4>
    <a href="{{ url_for('admin.customer_create') }}" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg"></i> 新增客户</a>
</div>
<div class="card shadow-sm"><div class="card-body p-0"><div class="table-responsive">
    <table class="table table-hover table-striped mb-0 align-middle">
        <thead class="table-light"><tr><th>客户名称</th><th>联系人</th><th>电话</th><th>备注</th><th>操作</th></tr></thead>
        <tbody>
        {% for r in customers %}
        <tr>
            <td>{{ r.name }}</td><td>{{ r.contact or "" }}</td><td>{{ r.phone or "" }}</td><td><small class="text-muted">{{ r.remark or "" }}</small></td>
            <td class="text-nowrap">
                <a href="{{ url_for('admin.customer_edit', id=r.id) }}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                <form method="POST" action="{{ url_for('admin.customer_delete', id=r.id) }}" class="d-inline" onsubmit="return confirm('确定删除？')">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                </form>
            </td>
        </tr>
        {% else %}
        <tr><td colspan="5" class="text-center text-muted py-4">暂无客户</td></tr>
        {% endfor %}
        </tbody>
    </table>
</div></div></div>
{% endblock %}
