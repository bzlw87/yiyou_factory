# ============================================================
# Nginx 配置文件示例
# 文件位置：/etc/nginx/sites-available/yiyou_factory
# ============================================================
#
# 这个配置做了什么：
# 1. 监听 80 端口（HTTP）
# 2. 把所有请求转发给 Gunicorn（运行在 8000 端口）
# 3. 静态文件（CSS、JS、图片）由 Nginx 直接处理，速度更快
#
# 使用方法：
# 1. 把这个文件复制到 /etc/nginx/sites-available/yiyou_factory
# 2. 创建软链接：sudo ln -s /etc/nginx/sites-available/yiyou_factory /etc/nginx/sites-enabled/
# 3. 测试配置：sudo nginx -t
# 4. 重启 Nginx：sudo systemctl restart nginx

server {
    listen 80;
    server_name your_domain.com;  # 替换成你的域名或服务器公网IP

    # 请求体大小限制（上传文件时需要）
    client_max_body_size 10M;

    # 静态文件由 Nginx 直接处理
    location /static/ {
        alias /home/yiyou/yiyou_factory/app/static/;
        expires 30d;  # 缓存30天
        add_header Cache-Control "public, no-transform";
    }

    # 所有其他请求转发给 Gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }
}
